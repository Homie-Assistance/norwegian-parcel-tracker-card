<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Norwegian Parcel Tracker Card</title>
  <desc id="desc">A Lovelace dashboard card icon showing a parcel tracking panel with coloured status rows.</desc>

  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F7FF"/>
      <stop offset="1" stop-color="#BDEBFF"/>
    </linearGradient>
    <linearGradient id="header" x1="68" y1="88" x2="444" y2="152" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD783"/>
      <stop offset="1" stop-color="#F3A93E"/>
    </linearGradient>
    <filter id="cardshadow" x="52" y="72" width="416" height="384" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#17324D" flood-opacity="0.20"/>
    </filter>
    <!-- clip for card rounded corners on header -->
    <clipPath id="cardclip">
      <rect x="68" y="88" width="376" height="340" rx="20"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg)"/>

  <!-- card panel -->
  <g filter="url(#cardshadow)">
    <rect x="68" y="88" width="376" height="340" rx="20" fill="white"/>
  </g>

  <!-- header bar (clipped to card shape) -->
  <g clip-path="url(#cardclip)">
    <rect x="68" y="88" width="376" height="62" fill="url(#header)"/>
  </g>

  <!-- header title decoration -->
  <rect x="92" y="108" width="120" height="14" rx="7" fill="white" opacity="0.9"/>
  <rect x="92" y="128" width="68" height="9"  rx="4" fill="white" opacity="0.6"/>

  <!-- header add-input decoration (right side) -->
  <rect x="326" y="103" width="100" height="34" rx="8" fill="white" opacity="0.25"/>
  <rect x="396" y="103" width="34"  height="34" rx="8" fill="white" opacity="0.35"/>
  <line x1="413" y1="115" x2="413" y2="125" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="408" y1="120" x2="418" y2="120" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

  <!-- ── Row 1: neutral (in-transit) ── -->
  <rect x="80"  y="164" width="352" height="72" rx="10" fill="#EEF4FA"/>
  <!-- left accent -->
  <rect x="80"  y="164" width="6"   height="72" rx="3"  fill="#176C9E"/>
  <!-- tiny isometric box -->
  <g transform="translate(114,196)">
    <path d="M0,-14 L14,0 L0,10 L-14,0 Z"    fill="#FFD783" stroke="#8B531B" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M-14,0 L0,10 L0,26 L-14,16 Z"   fill="#F6B34B" stroke="#8B531B" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M14,0  L0,10 L0,26 L14,16 Z"    fill="#E89231" stroke="#8B531B" stroke-width="3.5" stroke-linejoin="round"/>
  </g>
  <!-- text bars -->
  <rect x="148" y="178" width="130" height="13" rx="6" fill="#90B4CC"/>
  <rect x="148" y="199" width="82"  height="9"  rx="4" fill="#B0CCE0"/>
  <!-- status chip -->
  <rect x="354" y="176" width="66"  height="24" rx="12" fill="#D0E8F5"/>
  <rect x="362" y="184" width="50"  height="8"  rx="4" fill="#90B4CC"/>

  <!-- ── Row 2: warning (stuck / stale) ── -->
  <rect x="80"  y="248" width="352" height="72" rx="10" fill="#FFF3CC"/>
  <rect x="80"  y="248" width="6"   height="72" rx="3"  fill="#F3A93E"/>
  <g transform="translate(114,280)">
    <path d="M0,-14 L14,0 L0,10 L-14,0 Z"    fill="#FFD783" stroke="#8B531B" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M-14,0 L0,10 L0,26 L-14,16 Z"   fill="#F6B34B" stroke="#8B531B" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M14,0  L0,10 L0,26 L14,16 Z"    fill="#E89231" stroke="#8B531B" stroke-width="3.5" stroke-linejoin="round"/>
  </g>
  <rect x="148" y="262" width="140" height="13" rx="6" fill="#D4A030"/>
  <rect x="148" y="283" width="90"  height="9"  rx="4" fill="#E0B84A"/>
  <rect x="354" y="260" width="66"  height="24" rx="12" fill="#FFE08A"/>
  <rect x="362" y="268" width="50"  height="8"  rx="4" fill="#D4A030"/>

  <!-- ── Row 3: delivered (green) ── -->
  <rect x="80"  y="332" width="352" height="72" rx="10" fill="#D4EDDA"/>
  <rect x="80"  y="332" width="6"   height="72" rx="3"  fill="#37B24D"/>
  <g transform="translate(114,364)">
    <path d="M0,-14 L14,0 L0,10 L-14,0 Z"    fill="#FFD783" stroke="#8B531B" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M-14,0 L0,10 L0,26 L-14,16 Z"   fill="#F6B34B" stroke="#8B531B" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M14,0  L0,10 L0,26 L14,16 Z"    fill="#E89231" stroke="#8B531B" stroke-width="3.5" stroke-linejoin="round"/>
  </g>
  <rect x="148" y="346" width="120" height="13" rx="6" fill="#4CA863"/>
  <rect x="148" y="367" width="96"  height="9"  rx="4" fill="#6EC480"/>
  <!-- delivered checkmark badge -->
  <circle cx="387" cy="368" r="24" fill="#37B24D" stroke="#0B5D1E" stroke-width="6"/>
  <path d="M375 368 L383 376 L401 356" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
