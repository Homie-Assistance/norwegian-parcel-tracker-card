<svg width="800" height="250" viewBox="0 0 800 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Norwegian Parcel Tracker Card</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F7FF"/>
      <stop offset="1" stop-color="#BDEBFF"/>
    </linearGradient>
    <linearGradient id="header" x1="32" y1="42" x2="216" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD783"/>
      <stop offset="1" stop-color="#F3A93E"/>
    </linearGradient>
    <filter id="cardshadow" x="18" y="30" width="220" height="200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#17324D" flood-opacity="0.18"/>
    </filter>
    <clipPath id="cardclip">
      <rect x="32" y="42" width="184" height="166" rx="12"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="800" height="250" fill="url(#bg)"/>

  <!-- mini card panel -->
  <g filter="url(#cardshadow)">
    <rect x="32" y="42" width="184" height="166" rx="12" fill="white"/>
  </g>

  <!-- card header -->
  <g clip-path="url(#cardclip)">
    <rect x="32" y="42" width="184" height="30" fill="url(#header)"/>
  </g>
  <rect x="44" y="50" width="58" height="7" rx="3" fill="white" opacity="0.9"/>
  <rect x="44" y="62" width="34" height="5" rx="2" fill="white" opacity="0.6"/>

  <!-- row 1: neutral -->
  <rect x="40"  y="82"  width="168" height="34" rx="6" fill="#EEF4FA"/>
  <rect x="40"  y="82"  width="4"   height="34" rx="2" fill="#176C9E"/>
  <g transform="translate(58,99)">
    <path d="M0,-7 L7,0 L0,5 L-7,0 Z"   fill="#FFD783" stroke="#8B531B" stroke-width="2" stroke-linejoin="round"/>
    <path d="M-7,0 L0,5 L0,13 L-7,8 Z"  fill="#F6B34B" stroke="#8B531B" stroke-width="2" stroke-linejoin="round"/>
    <path d="M7,0  L0,5 L0,13 L7,8 Z"   fill="#E89231" stroke="#8B531B" stroke-width="2" stroke-linejoin="round"/>
  </g>
  <rect x="74"  y="88"  width="64" height="6" rx="3" fill="#90B4CC"/>
  <rect x="74"  y="100" width="40" height="5" rx="2" fill="#B0CCE0"/>

  <!-- row 2: warning -->
  <rect x="40"  y="124" width="168" height="34" rx="6" fill="#FFF3CC"/>
  <rect x="40"  y="124" width="4"   height="34" rx="2" fill="#F3A93E"/>
  <g transform="translate(58,141)">
    <path d="M0,-7 L7,0 L0,5 L-7,0 Z"   fill="#FFD783" stroke="#8B531B" stroke-width="2" stroke-linejoin="round"/>
    <path d="M-7,0 L0,5 L0,13 L-7,8 Z"  fill="#F6B34B" stroke="#8B531B" stroke-width="2" stroke-linejoin="round"/>
    <path d="M7,0  L0,5 L0,13 L7,8 Z"   fill="#E89231" stroke="#8B531B" stroke-width="2" stroke-linejoin="round"/>
  </g>
  <rect x="74"  y="130" width="70" height="6" rx="3" fill="#D4A030"/>
  <rect x="74"  y="142" width="44" height="5" rx="2" fill="#E0B84A"/>

  <!-- row 3: delivered -->
  <rect x="40"  y="166" width="168" height="34" rx="6" fill="#D4EDDA"/>
  <rect x="40"  y="166" width="4"   height="34" rx="2" fill="#37B24D"/>
  <g transform="translate(58,183)">
    <path d="M0,-7 L7,0 L0,5 L-7,0 Z"   fill="#FFD783" stroke="#8B531B" stroke-width="2" stroke-linejoin="round"/>
    <path d="M-7,0 L0,5 L0,13 L-7,8 Z"  fill="#F6B34B" stroke="#8B531B" stroke-width="2" stroke-linejoin="round"/>
    <path d="M7,0  L0,5 L0,13 L7,8 Z"   fill="#E89231" stroke="#8B531B" stroke-width="2" stroke-linejoin="round"/>
  </g>
  <rect x="74"  y="172" width="58" height="6" rx="3" fill="#4CA863"/>
  <rect x="74"  y="184" width="46" height="5" rx="2" fill="#6EC480"/>
  <circle cx="192" cy="183" r="12" fill="#37B24D" stroke="#0B5D1E" stroke-width="3"/>
  <path d="M186 183 L190 187 L199 176" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- vertical divider -->
  <line x1="248" y1="32" x2="248" y2="218" stroke="#B8D8EC" stroke-width="1.5"/>

  <!-- text block -->
  <text x="274" y="100" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="46" font-weight="700" fill="#1E3A5F" letter-spacing="-0.5">Norwegian</text>
  <text x="274" y="148" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="46" font-weight="700" fill="#1E3A5F" letter-spacing="-0.5">Parcel Tracker</text>
  <text x="276" y="185" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="600" fill="#D77B21" letter-spacing="0.5">Lovelace Card</text>
  <text x="278" y="212" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="400" fill="#5A7A9A">for Home Assistant</text>
</svg>
